<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitalTacc - Panel de Gestión</title>
    <link rel="stylesheet" href="estilos.css">
</head>

<body>

    <header>
        <div class="logo-container">
            <div class="logo-text">VITAL<span>TACC</span> ⚙️</div>
            <div style="color: #888; font-weight: 500; font-size: 0.8rem;">Panel de Control Administrativo</div>
        </div>
        <nav>
            <a href="index.html"
                style="text-decoration: none; color: #3483fa; font-weight: bold; display: flex; align-items: center; gap: 5px;">
                <span>🛒</span> Ver Tienda
            </a>
        </nav>
    </header>

    <div class="admin-container">

        <div class="admin-panel" style="border-left: 5px solid var(--celeste);">
            <h3 style="margin: 0 0 15px 0; color: var(--celeste);">📦 Reposición de Stock (Nuevo Lote)</h3>
            <div class="form-grid">
                <input type="number" id="repo-id" placeholder="ID del Producto">
                <input type="text" id="repo-lote" placeholder="N° de Lote (Ej: L-100)">
                <input type="number" id="repo-cantidad" placeholder="Cantidad que ingresa">
                <input type="date" id="repo-vencimiento" title="Fecha de Vencimiento">
                <button class="btn-guardar" onclick="reponerLoteExistente()" style="background: var(--verde-ml);">+
                    CARGAR LOTES</button>
            </div>
            <p style="font-size: 11px; color: #888; margin-top: 10px;">* Usar para productos que ya figuran en la tabla
                de abajo.</p>
        </div>

        <div class="admin-panel" style="margin-top: 20px;">
            <h3 style="margin: 0 0 15px 0;">✨ Alta de Producto Nuevo</h3>
            <div class="form-grid">
                <input type="text" id="nombre" placeholder="Nombre Producto">
                <select id="categoria">
                    <option value="General">Categoría: General</option>
                    <option value="Harinas">Harinas / Premix</option>
                    <option value="Snacks">Snacks / Galletitas</option>
                    <option value="Bebidas">Bebidas</option>
                    <option value="Reposteria">Repostería</option>
                </select>
                <input type="text" id="descripcion" placeholder="Descripción">
                <input type="number" id="precio" placeholder="Precio ($)">
                <input type="text" id="nuevo-lote-nro" placeholder="N° Lote inicial">
                <input type="date" id="nuevo-lote-venc">
                <input type="number" id="nuevo-lote-cant" placeholder="Cantidad inicial">
                <button class="btn-guardar" onclick="agregarProductoNuevo()">CREAR PRODUCTO</button>
            </div>
        </div>

        <h2>Inventario Detallado y Alertas</h2>
        <table class="tabla-gestion">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Producto</th>
                    <th>Categoría</th>
                    <th>Stock Total</th>
                    <th>Próx. Vencimiento</th>
                    <th>Precio</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="cuerpoTablaAdmin"></tbody>
        </table>
    </div>

    <script>
        const API_URL = 'http://localhost:8080/productos';
        const API_LOTES = 'http://localhost:8080/lotes/guardar';

        // 1. CARGAR TABLA CON LÓGICA DE FILTRADO DE LOTES VACÍOS
        async function cargarInventario() {
            try {
                const res = await fetch(API_URL);
                const productos = await res.json();
                const tabla = document.getElementById('cuerpoTablaAdmin');
                tabla.innerHTML = '';

                productos.forEach(p => {
                    const stockTotal = p.lotes ? p.lotes.reduce((acc, l) => acc + l.cantidad, 0) : 0;

                    // LÓGICA MEJORADA: 
                    // Buscamos el primer lote que tenga stock (> 0) para mostrar su fecha
                    let loteActivo = p.lotes ? p.lotes.find(l => l.cantidad > 0) : null;

                    // Si no hay lotes con stock, buscamos el que vence más pronto de la lista total
                    if (!loteActivo && p.lotes && p.lotes.length > 0) {
                        loteActivo = [...p.lotes].sort((a, b) => new Date(a.fechaVencimiento) - new Date(b.fechaVencimiento))[0];
                    }

                    let proxVenc = loteActivo ? loteActivo.fechaVencimiento : "---";
                    let esCritico = false;

                    if (loteActivo && loteActivo.fechaVencimiento) {
                        const hoy = new Date();
                        const venc = new Date(loteActivo.fechaVencimiento);
                        const diff = Math.ceil((venc - hoy) / (1000 * 60 * 60 * 24));
                        // Alerta si vence en menos de 15 días o si ya venció (diff <= 0)
                        if (diff < 15) esCritico = true;
                    }

                    tabla.innerHTML += `
                        <tr class="${esCritico ? 'fila-critica' : ''}">
                            <td><b>${p.id}</b></td>
                            <td>${p.nombre}</td>
                            <td>${p.categoria}</td>
                            <td>
                                <span class="badge-stock ${stockTotal < 5 ? 'stock-bajo' : 'stock-ok'}">
                                    ${stockTotal} un.
                                </span>
                            </td>
                            <td class="${esCritico ? 'texto-alerta' : ''}">
                                ${proxVenc} ${esCritico ? '⚠️' : ''}
                                ${(!loteActivo || stockTotal <= 0) ? '<br><small style="color:red">AGOTADO</small>' : ''}
                            </td>
                            <td>$${p.precio}</td>
                            <td class="acciones-celda">
                                <button class="btn-accion btn-edit" onclick="prepararReposicion(${p.id})" title="Cargar nuevo lote">📦+</button>
                                <button class="btn-accion btn-borrar" onclick="borrar(${p.id})">🗑️</button>
                            </td>
                        </tr>
                    `;
                });
            } catch (error) { console.error(error); }
        }

        // 2. FUNCIÓN PARA REPOSICIÓN (OPCIÓN B)
        async function reponerLoteExistente() {
            const id = document.getElementById('repo-id').value;
            const cant = document.getElementById('repo-cantidad').value;
            const venc = document.getElementById('repo-vencimiento').value;
            const nro = document.getElementById('repo-lote').value;

            if (!id || !cant || !venc) return alert("Completa ID, Cantidad y Vencimiento");

            const loteData = {
                numeroLote: nro,
                cantidad: parseInt(cant),
                fechaVencimiento: venc,
                producto: { id: parseInt(id) }
            };

            const resp = await fetch(API_LOTES, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(loteData)
            });

            if (resp.ok) {
                alert("✅ Stock repuesto con éxito");
                limpiarRepo();
                cargarInventario();
            } else {
                alert("❌ Error al reponer. Verifica el ID.");
            }
        }

        // 3. FUNCIÓN PARA PRODUCTO COMPLETAMENTE NUEVO
        async function agregarProductoNuevo() {
            const nombre = document.getElementById('nombre').value;
            const precio = document.getElementById('precio').value;
            const cant = document.getElementById('nuevo-lote-cant').value;

            if (!nombre || !precio || !cant) return alert("Nombre, Precio y Cantidad son obligatorios");

            const data = {
                nombre: nombre,
                categoria: document.getElementById('categoria').value,
                descripcion: document.getElementById('descripcion').value,
                precio: parseFloat(precio),
                numeroLote: document.getElementById('nuevo-lote-nro').value,
                fechaVencimiento: document.getElementById('nuevo-lote-venc').value,
                cantidad: parseInt(cant)
            };

            const resp = await fetch(`${API_URL}/con-lote`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (resp.ok) {
                alert("✨ Producto creado con éxito");
                location.reload();
            }
        }

        function prepararReposicion(id) {
            document.getElementById('repo-id').value = id;
            window.scrollTo(0, 0);
            document.getElementById('repo-cantidad').focus();
        }

        function limpiarRepo() {
            document.getElementById('repo-id').value = '';
            document.getElementById('repo-cantidad').value = '';
            document.getElementById('repo-vencimiento').value = '';
            document.getElementById('repo-lote').value = '';
        }

        async function borrar(id) {
            if (confirm('¿Eliminar producto?')) {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                cargarInventario();
            }
        }

        cargarInventario();
    </script>
</body>

</html>
