<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitalTacc - Panel de Gestión</title>
    <link rel="stylesheet" href="estilos.css">
</head>

<body>

    <header>
        <div class="logo-container">
            <div class="logo-text">VITAL<span>TACC</span> ⚙️</div>
            <div style="color: #888; font-weight: 500; font-size: 0.8rem;">Panel de Control Administrativo</div>
        </div>
        <nav>
            <a href="index.html"
                style="text-decoration: none; color: #3483fa; font-weight: bold; display: flex; align-items: center; gap: 5px;">
                <span>🛒</span> Ver Tienda
            </a>
        </nav>
    </header>

    <div class="admin-container">
        <div class="admin-panel">
            <h2 style="margin: 0 0 20px 0;">Entrada de Mercadería (Lotes)</h2>
            <div class="form-grid">
                <input type="text" id="nombre" placeholder="Nombre Producto">
                <select id="categoria">
                    <option value="General">Categoría: General</option>
                    <option value="Harinas">Harinas / Premix</option>
                    <option value="Snacks">Snacks / Galletitas</option>
                    <option value="Bebidas">Bebidas</option>
                    <option value="Reposteria">Repostería</option>
                </select>
                <input type="text" id="descripcion" placeholder="Descripción (ej: Sin azúcar)">
                <input type="number" id="precio" placeholder="Precio Venta ($)">
                <input type="text" id="lote" placeholder="N° de Lote">
                <input type="date" id="vencimiento" title="Fecha de Vencimiento">
                <input type="number" id="stock" placeholder="Cantidad">
                <button class="btn-guardar" onclick="agregarProductoAdmin()">+ CARGAR STOCK</button>
            </div>
        </div>

        <h2>Inventario Detallado y Alertas</h2>
        <table class="tabla-gestion">
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Categoría</th>
                    <th>Lote</th>
                    <th>Vencimiento</th>
                    <th>Stock Total</th>
                    <th>Precio</th>
                    <th>Promo</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="cuerpoTablaAdmin">
            </tbody>
        </table>
    </div>

    <script>
        const API_URL = 'http://localhost:8080/productos';

        async function cargarInventario() {
            try {
                const res = await fetch(API_URL);
                const productos = await res.json();
                const tabla = document.getElementById('cuerpoTablaAdmin');
                tabla.innerHTML = '';

                productos.forEach(p => {
                    const tieneLotes = p.lotes && p.lotes.length > 0;
                    const primerLote = tieneLotes ? p.lotes[0] : null;

                    const hoy = new Date();
                    let esCritico = false;
                    let fechaAMostrar = '---';

                    if (primerLote && primerLote.fechaVencimiento) {
                        const fechaVenc = new Date(primerLote.fechaVencimiento);
                        fechaAMostrar = primerLote.fechaVencimiento;
                        const diffTime = fechaVenc - hoy;
                        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                        if (diffDays < 15) esCritico = true;
                    }

                    // Calculamos el stock total sumando las cantidades de sus lotes
                    const stockTotal = tieneLotes ? p.lotes.reduce((acc, l) => acc + l.cantidad, 0) : 0;

                    tabla.innerHTML += `
                        <tr class="${esCritico ? 'fila-critica' : ''}">
                            <td>
                                <b>${p.nombre}</b><br>
                                <div class="col-descripcion" title="${p.descripcion || ''}">
                                    ${p.descripcion || ''}
                                </div>
                            </td>
                            <td>${p.categoria || 'General'}</td>
                            <td><code style="background: #eee; padding: 2px 5px;">${primerLote ? primerLote.numeroLote : 'N/A'}</code></td>
                            <td class="${esCritico ? 'texto-alerta' : ''}">
                                ${fechaAMostrar} ${esCritico ? '⚠️' : ''}
                            </td>
                            <td>
                                <span class="badge-stock ${stockTotal < (p.stockMinimo || 5) ? 'stock-bajo' : 'stock-ok'}">
                                    ${stockTotal} un.
                                </span>
                            </td>
                            <td>$${p.precio}</td>
                            <td>
                                <button class="btn-accion btn-promo" onclick="gestionarPromo(${p.id})">
                                    %
                                </button>
                            </td>
                            <td class="acciones-celda">
                                <button class="btn-accion btn-edit" onclick="editar(${p.id})">✏️</button>
                                <button class="btn-accion btn-borrar" onclick="borrar(${p.id})">🗑️</button>
                            </td>
                        </tr>
                    `;
                });
            } catch (error) {
                console.error("Error al cargar inventario:", error);
            }
        }

        async function agregarProductoAdmin() {
            const nombre = document.getElementById('nombre').value;
            const categoria = document.getElementById('categoria').value;
            const descripcion = document.getElementById('descripcion').value;
            const precio = document.getElementById('precio').value;
            const lote = document.getElementById('lote').value;
            const fechaVencimiento = document.getElementById('vencimiento').value;
            const stock = document.getElementById('stock').value;

            if (!nombre || !lote || !fechaVencimiento || !stock) {
                alert("Completa los campos obligatorios: Nombre, Lote, Vencimiento y Cantidad");
                return;
            }

            // Mapeo exacto para que coincida con el DTO/Controller de Java
            const nuevo = {
                nombre: nombre,
                categoria: categoria,
                descripcion: descripcion,
                precio: parseFloat(precio),
                numeroLote: lote,
                fechaVencimiento: fechaVencimiento,
                cantidad: parseInt(stock),
                stockMinimo: 5 // Valor por defecto para alertas
            };

            try {
                const response = await fetch(`${API_URL}/con-lote`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(nuevo)
                });

                if (response.ok) {
                    alert("¡Producto y Lote guardados correctamente!");
                    limpiarForm();
                    cargarInventario();
                } else {
                    const errorMsg = await response.text();
                    alert("Error al guardar: " + errorMsg);
                }
            } catch (error) {
                console.error("Error en la petición:", error);
                alert("No se pudo conectar con el servidor.");
            }
        }

        async function gestionarPromo(id) {
            const pct = prompt("Porcentaje de descuento:");
            if (pct && !isNaN(pct)) {
                try {
                    const res = await fetch(`${API_URL}/${id}/descuento`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ porcentaje: parseFloat(pct) })
                    });
                    if (res.ok) {
                        alert(`¡Descuento aplicado!`);
                        cargarInventario();
                    }
                } catch (error) {
                    console.error("Error al aplicar descuento:", error);
                }
            }
        }

        function limpiarForm() {
            document.querySelectorAll('input').forEach(i => i.value = '');
            document.getElementById('categoria').selectedIndex = 0;
        }

        async function borrar(id) {
            if (confirm('¿Seguro desea eliminar este producto?')) {
                try {
                    const res = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                    if (res.ok) {
                        cargarInventario();
                    }
                } catch (error) {
                    console.error("Error al borrar:", error);
                }
            }
        }

        // Carga inicial al abrir la página
        cargarInventario();
    </script>
</body>

</html>
