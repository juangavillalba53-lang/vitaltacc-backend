<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitalTacc - Panel de Gestión</title>
    <link rel="stylesheet" href="estilos.css">
    <style>
        /* Estilos específicos para la vista de Administración */
        .admin-container {
            max-width: 1300px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .tabla-gestion {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            margin-top: 20px;
        }

        .tabla-gestion th,
        .tabla-gestion td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        .tabla-gestion th {
            background-color: #00a1b4;
            /* Celeste VitalTacc */
            color: white;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }

        /* Alerta de Vencimiento: Fila roja */
        .fila-critica {
            background-color: #fff5f5 !important;
        }

        .texto-alerta {
            color: #e74c3c;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .badge-stock {
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
        }

        .stock-bajo {
            background: #fff3e0;
            color: #ef6c00;
        }

        .stock-ok {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .btn-accion {
            padding: 6px 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            transition: 0.2s;
        }

        .admin-panel {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            border: 1px solid #e0e0e0;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        input,
        select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

        .btn-guardar {
            background: #00a1b4;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo-container">
            <div class="logo-text">VITAL<span>TACC</span> ⚙️</div>
            <div style="color: #888; font-weight: 500; font-size: 0.8rem;">Panel de Control Administrativo</div>
        </div>
        <nav>
            <a href="index.html"
                style="text-decoration: none; color: #3483fa; font-weight: bold; display: flex; align-items: center; gap: 5px;">
                <span>🛒</span> Ver Tienda
            </a>
        </nav>
    </header>

    <div class="admin-container">
        <div class="admin-panel">
            <h2 style="margin: 0 0 20px 0;">Entrada de Mercadería (Lotes)</h2>
            <div class="form-grid">
                <input type="text" id="nombre" placeholder="Nombre Producto">
                <select id="categoria">
                    <option value="General">Categoría: General</option>
                    <option value="Harinas">Harinas / Premix</option>
                    <option value="Snacks">Snacks / Galletitas</option>
                    <option value="Bebidas">Bebidas</option>
                    <option value="Reposteria">Repostería</option>
                </select>
                <input type="number" id="precio" placeholder="Precio Venta ($)">
                <input type="text" id="lote" placeholder="N° de Lote">
                <input type="date" id="vencimiento" title="Fecha de Vencimiento">
                <input type="number" id="stock" placeholder="Cantidad">
                <button class="btn-guardar" onclick="agregarProductoAdmin()">+ CARGAR STOCK</button>
            </div>
        </div>

        <h2 style="margin-top: 40px;">Inventario Detallado y Alertas</h2>
        <table class="tabla-gestion">
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Categoría</th>
                    <th>Lote</th>
                    <th>Vencimiento</th>
                    <th>Stock Total</th>
                    <th>Precio</th>
                    <th>Promociones</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="cuerpoTablaAdmin">
            </tbody>
        </table>
    </div>

    <script>
        const API_URL = 'http://localhost:8080/productos';

        async function cargarInventario() {
            try {
                const res = await fetch(API_URL);
                const productos = await res.json();
                const tabla = document.getElementById('cuerpoTablaAdmin');
                tabla.innerHTML = '';

                productos.forEach(p => {
                    // Lógica para la Opción B: Obtener el primer lote del array 'lotes'
                    const tieneLotes = p.lotes && p.lotes.length > 0;
                    const primerLote = tieneLotes ? p.lotes[0] : null;

                    // Lógica de alerta: Menos de 15 días es crítico
                    const hoy = new Date();
                    let esCritico = false;
                    let fechaAMostrar = '---';

                    if (primerLote && primerLote.fechaVencimiento) {
                        const fechaVenc = new Date(primerLote.fechaVencimiento);
                        fechaAMostrar = primerLote.fechaVencimiento;

                        // Calculamos la diferencia en días
                        const diffTime = fechaVenc - hoy;
                        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                        if (diffDays < 15) esCritico = true;
                    }

                    tabla.innerHTML += `
                        <tr class="${esCritico ? 'fila-critica' : ''}">
                            <td><b>${p.nombre}</b></td>
                            <td>${p.categoria || 'General'}</td>
                            <td>
                                <code style="background: #eee; padding: 2px 5px; border-radius: 3px;">
                                    ${primerLote ? primerLote.numeroLote : 'N/A'}
                                </code>
                            </td>
                            <td class="${esCritico ? 'texto-alerta' : ''}">
                                ${fechaAMostrar} 
                                ${esCritico ? '<span>⚠️</span>' : ''}
                            </td>
                            <td>
                                <span class="badge-stock ${p.stock < 5 ? 'stock-bajo' : 'stock-ok'}">
                                    ${p.stock} un.
                                </span>
                            </td>
                            <td>$${p.precio}</td>
                            <td>
                                <button class="btn-accion" style="background: #ff9f43; color: white;" onclick="gestionarPromo(${p.id})">
                                    % Activar
                                </button>
                            </td>
                            <td>
                                <button class="btn-accion" style="background: #f4f4f4; color: #333;" onclick="editar(${p.id})">✏️</button>
                                <button class="btn-accion" style="background: #fff; color: #ff4d4d; border: 1px solid #ff4d4d; margin-left: 5px;" onclick="borrar(${p.id})">🗑️</button>
                            </td>
                        </tr>
                    `;
                });
            } catch (error) {
                console.error("Error al conectar con la API:", error);
            }
        }

        async function agregarProductoAdmin() {
            const nombre = document.getElementById('nombre').value;
            const categoria = document.getElementById('categoria').value;
            const precio = document.getElementById('precio').value;
            const lote = document.getElementById('lote').value;
            const fechaVencimiento = document.getElementById('vencimiento').value;
            const stock = document.getElementById('stock').value;

            if (!nombre || !lote || !fechaVencimiento) {
                alert("Por favor completa los campos críticos (Nombre, Lote y Vencimiento)");
                return;
            }

            const nuevo = {
                nombre,
                categoria,
                precio,
                lote,
                fechaVencimiento,
                stock
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(nuevo)
                });

                if (response.ok) {
                    limpiarForm();
                    cargarInventario();
                }
            } catch (error) {
                console.error("Error al guardar:", error);
            }
        }

        function gestionarPromo(id) {
            const pct = prompt("Porcentaje de descuento para este producto:");
            if (pct) alert(`Promoción del ${pct}% activada para el producto ID ${id}`);
        }

        function limpiarForm() {
            document.querySelectorAll('input').forEach(i => i.value = '');
            document.getElementById('categoria').selectedIndex = 0;
        }

        async function borrar(id) {
            if (confirm('¿Seguro desea eliminar este producto y todos sus lotes asociados?')) {
                try {
                    await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                    cargarInventario();
                } catch (error) {
                    console.error("Error al borrar:", error);
                }
            }
        }

        // Carga inicial
        cargarInventario();
    </script>
</body>

</html>
